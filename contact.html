<head>

    <link rel="icon" href="assets/images/tlv_icon.webp" type="image/x-icon">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <header>
        <nav class="navbar navbar-expand-lg bg-primary">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">
                    <img src="./assets/images/logo_tlv.svg" alt="Te Lo Vendo" width="60" height="auto">
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link" href="index.html">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="catalog.html">Catálogo</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="aboutus.html">Sobre nosotros</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link  active" href="contact.html">Contacto</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <!-- ======================= HERO ======================= -->
        <div class="container-fluid hero">
            <div class="hero__content">
                <img class="hero__image" src="./assets/images/tlv_banner.jpeg" alt="Te Lo Vendo">
                <p class="hero__slogan">Encuentra lo que necesitas, rápido y seguro</p>
            </div>
        </div>
        <!-- ======================= FORM ======================= -->
        <div class="container px-5 ">
            <section class="form p-5">

                <!-- alert confirmación -->
                <div class=" container alert ">
                    <!-- <div id="successAlert" class="alert alert-info" role="alert">
                        Guardado Exitosamente
                    </div> -->
                    <div class="modal fade" id="exampleModal" data-bs-backdrop="false"  tabindex="-1" aria-labelledby="exampleModalLabel"
                        aria-hidden="true">
                        <div class="modal-dialog">
                            <div class="modal-content bg-success text-white">
                                <!-- <div class="modal-header">
                                    
                                    <button type="button" class="btn-close" data-bs-dismiss="modal"
                                        aria-label="Close"></button>
                                </div> -->
                                <div class="modal-body text-center">
                                    <h1 class="modal-title fs-5" id="exampleModalLabel">Guardado Exitosamente!!</h1>
                                </div>
                                <!-- <div class="modal-footer">
                                    
                                </div> -->
                            </div>
                        </div>
                    </div>
                </div>

                <div class="form__title text-center">
                    <h2>Contáctanos</h2>
                </div>
                <div class="form__subtitle text-center">Para mayor información</div>
                <div class="form__content">
                    <form class="container px-5" action="">
                        <div class="form__item pt-4 pb-3">
                            <div>
                                <label class="item__label form-label" for="name">Nombre :</label>
                            </div>
                            <div>
                                <input class="form__input form-control" type="text" id="name" placeholder="Maria">
                            </div>
                        </div>
                        <div class="form__item pb-3">
                            <div class="">
                                <label class="item__label__apellido form-label" for="last__name">Apellido :</label>
                            </div>
                            <div class="">
                                <input class="form__input form-control" type="text" id="last__name"
                                    placeholder="Vargas">
                            </div>
                        </div>
                        <div class="form__item pb-3">
                            <div class="">
                                <label class="item__label form-label" for="comentario">Comentario</label>
                            </div>
                            <div class="">
                                <textarea class="form__textarea form-control" name="" id="comentario" cols="30"
                                    rows="10"></textarea>
                            </div>

                        </div>
                        <div class="form__item  text-center  mt-2">
                            <button class="form__button btn btn-primary" type="submit" data-bs-toggle="modal"
                                data-bs-target="#exampleModal">Enviar</button>
                        </div>
                    </form>
                </div>
            </section>
        </div>
    </main>
    <!-- ======================= FOOTER ======================= -->
  <footer>
    <div class="container-fluid">
      <div class="row">
          <div class="col-lg-9 col-md-12 text-center mt-3">

              <p>Diseñado con ♥ para servirte mejor.</p>
          </div>
          <div class="col-lg-3 col-md-12 mb-2 text-center">
            <div class="footer__social">
              <a href="#" class="footer__link footer__link--twitter"></a>
              <a href="#" class="footer__link footer__link--facebook"></a>
              <a href="#" class="footer__link footer__link--linkedin"></a>
            </div>
          </div>
      </div>
  </div>
  </footer>
